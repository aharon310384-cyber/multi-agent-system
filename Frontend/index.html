<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Многоагентная Система · Чат с агентами</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05070A;
    --bg2: #080B10;
    --surface: #10151D;
    --surface-2: #141A23;
    --surface-3: #1A2230;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.16);
    --text: #F4F7FA;
    --text-2: #8E9AAA;
    --text-3: #5C6776;
    --cyan: #4DE3FF;
    --green: #66F2A6;
    --amber: #F6C85F;
    --red: #FF5C7A;
    --violet: #C8A2FF;
  }
  * { box-sizing: border-box; }
  html, body, #root { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
  button { font-family: inherit; cursor: pointer; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }

  /* ============ App shell ============ */
  .app {
    display: grid;
    grid-template-rows: 52px 1fr;
    height: 100vh;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(77,227,255,0.03), transparent 60%),
      var(--bg);
  }

  /* ============ TopBar ============ */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(16,21,29,0.85), rgba(8,11,16,0.7));
    backdrop-filter: blur(6px);
  }
  .tb-left { display: flex; align-items: center; gap: 10px; }
  .tb-mark {
    width: 28px; height: 28px; display: grid; place-items: center;
    border: 1px solid var(--border-strong); border-radius: 6px;
    background: rgba(77,227,255,0.06);
  }
  .tb-title { font-size: 13px; font-weight: 600; letter-spacing: -0.005em; }
  .tb-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-2); letter-spacing: 0.08em; text-transform: uppercase; }
  .tb-right { display: flex; align-items: center; gap: 10px; }
  .tb-pill {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid var(--border); border-radius: 4px;
    padding: 4px 8px; background: rgba(20,26,35,0.5);
    font-size: 11px; color: var(--text-2);
  }
  .tb-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }
  .tb-pill.warn .dot { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .tb-pill.err .dot { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .tb-link {
    color: var(--text-2); text-decoration: none; font-size: 11px;
    padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px;
    background: transparent; transition: all 0.15s;
  }
  .tb-link:hover { color: var(--text); border-color: var(--border-strong); }

  /* ============ Workspace 3-col ============ */
  .workspace {
    display: grid;
    grid-template-columns: 260px 1fr 320px;
    min-height: 0;
    overflow: hidden;
  }
  @media (max-width: 1100px) { .workspace { grid-template-columns: 240px 1fr; } .col-agents { display: none; } }
  @media (max-width: 800px)  { .workspace { grid-template-columns: 1fr; } .col-history { display: none; } }

  /* ============ Sidebar generic ============ */
  .col {
    display: flex; flex-direction: column;
    min-height: 0; min-width: 0;
    background: var(--bg2);
  }
  .col-history { border-right: 1px solid var(--border); }
  .col-agents { border-left: 1px solid var(--border); }
  .col-chat { background: var(--bg); }

  .col-head {
    padding: 12px 14px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-2);
    font-family: 'JetBrains Mono', monospace;
  }
  .col-body { flex: 1; min-height: 0; overflow-y: auto; padding: 8px; }

  /* ============ History sidebar ============ */
  .btn-new {
    width: 100%; padding: 10px 12px;
    background: var(--cyan); color: #05070A; border: 0;
    border-radius: 6px; font-weight: 600; font-size: 13px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-bottom: 8px;
  }
  .btn-new:hover { background: #6FEAFF; }
  .session-item {
    display: block; width: 100%; text-align: left;
    padding: 10px 12px; margin-bottom: 4px;
    background: transparent; border: 1px solid transparent;
    border-radius: 6px; color: var(--text);
    font-size: 13px; line-height: 1.35;
    transition: all 0.12s;
  }
  .session-item:hover { background: var(--surface); border-color: var(--border); }
  .session-item.is-active { background: var(--surface-2); border-color: var(--border-strong); }
  .session-item .si-title {
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; font-weight: 500;
  }
  .session-item .si-meta {
    margin-top: 6px; display: flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-3);
  }
  .si-dot { width: 6px; height: 6px; border-radius: 50%; }
  .session-item .si-del {
    float: right; opacity: 0; background: transparent; border: 0;
    color: var(--text-3); font-size: 14px; padding: 0 2px;
    transition: opacity 0.12s;
  }
  .session-item:hover .si-del { opacity: 1; }
  .session-item .si-del:hover { color: var(--red); }

  /* ============ Agents sidebar ============ */
  .dept-block { margin-bottom: 10px; }
  .dept-head {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-2); text-transform: uppercase; letter-spacing: 0.08em;
  }
  .dept-accent { width: 8px; height: 8px; border-radius: 2px; }
  .agent-btn {
    width: 100%; text-align: left; padding: 8px 10px;
    background: transparent; border: 1px solid transparent;
    border-radius: 5px; color: var(--text); font-size: 12.5px;
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 2px;
    transition: all 0.12s;
  }
  .agent-btn:hover { background: var(--surface); border-color: var(--border); }
  .agent-btn.is-active { background: var(--surface-2); border-color: var(--border-strong); }
  .agent-btn .ab-name { flex: 1; }
  .agent-btn .ab-skill {
    font-family: 'JetBrains Mono', monospace; font-size: 9.5px; color: var(--text-3);
    letter-spacing: 0.04em;
  }

  /* ============ Chat ============ */
  .chat {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100%;
    min-height: 0;
  }
  .chat-head {
    padding: 14px 22px;
    display: flex; align-items: center; gap: 14px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(20,26,35,0.4), transparent);
  }
  .chat-head-mark {
    width: 38px; height: 38px; border-radius: 8px;
    border: 1px solid var(--border-strong);
    display: grid; place-items: center;
    background: rgba(77,227,255,0.05);
  }
  .chat-head-title { font-size: 15px; font-weight: 600; }
  .chat-head-sub { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text-2); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
  .chat-head-actions { margin-left: auto; display: flex; gap: 6px; }
  .icon-btn {
    width: 32px; height: 32px; border-radius: 6px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text-2); display: grid; place-items: center;
    transition: all 0.12s;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface); }
  .icon-btn.is-on { color: var(--cyan); border-color: var(--cyan); background: rgba(77,227,255,0.08); }
  .icon-btn svg { width: 16px; height: 16px; }

  .chat-body {
    overflow-y: auto;
    padding: 24px 22px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .empty-state {
    margin: auto; max-width: 480px; text-align: center;
    color: var(--text-2);
  }
  .empty-state h2 { font-size: 22px; font-weight: 600; color: var(--text); margin: 0 0 10px; }
  .empty-state p { margin: 0 0 18px; font-size: 13.5px; }
  .empty-suggest {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  }
  .empty-suggest button {
    padding: 8px 12px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 12.5px;
  }
  .empty-suggest button:hover { background: var(--surface-2); border-color: var(--border-strong); }

  .msg { display: flex; flex-direction: column; gap: 4px; max-width: 760px; }
  .msg.is-user { align-self: flex-end; align-items: flex-end; }
  .msg.is-bot  { align-self: flex-start; align-items: flex-start; }
  .msg-meta {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--text-3); letter-spacing: 0.08em; text-transform: uppercase;
  }
  .msg-bubble {
    padding: 11px 14px; border-radius: 12px;
    font-size: 13.5px; line-height: 1.55;
    white-space: pre-wrap; word-wrap: break-word;
    border: 1px solid var(--border);
  }
  .msg.is-user .msg-bubble {
    background: rgba(77,227,255,0.08);
    border-color: rgba(77,227,255,0.25);
    border-bottom-right-radius: 4px;
  }
  .msg.is-bot .msg-bubble {
    background: var(--surface);
    border-bottom-left-radius: 4px;
  }
  .msg-route {
    font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
    color: var(--cyan); letter-spacing: 0.04em;
    padding: 2px 0;
  }
  .msg-okr {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--green); letter-spacing: 0.02em;
    padding-top: 2px;
  }
  .msg-tools {
    display: flex; flex-direction: column; gap: 4px;
    padding: 4px 0 2px;
  }
  .tool-chip {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
    padding: 4px 9px; border-radius: 999px;
    background: rgba(122,184,255,0.08);
    border: 1px solid rgba(122,184,255,0.3);
    color: var(--text-2);
    width: fit-content; max-width: 100%;
  }
  .tool-chip.is-running { border-color: rgba(122,184,255,0.55); }
  .tool-chip.is-done { border-color: rgba(102,242,166,0.5); background: rgba(102,242,166,0.06); }
  .tool-chip.is-error { border-color: rgba(255,158,122,0.6); background: rgba(255,158,122,0.08); color: var(--orange, #ff9e7a); }
  .tool-chip .tool-name { color: var(--cyan); letter-spacing: 0.03em; }
  .tool-chip .tool-arg {
    color: var(--text-3);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 380px;
  }
  .tool-chip .tool-status {
    margin-left: auto; font-size: 9.5px; opacity: 0.75;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .tool-chip.is-running .tool-status::after {
    content: '…';
  }
  .typing { display: inline-flex; align-items: center; gap: 4px; padding: 0 2px; }
  .typing span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text-2); display: inline-block;
    animation: blink 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

  /* ============ Composer ============ */
  .composer {
    border-top: 1px solid var(--border);
    background: var(--bg2);
    padding: 12px 16px 16px;
  }
  .composer-inner {
    max-width: 820px; margin: 0 auto;
    display: flex; align-items: flex-end; gap: 8px;
    background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: 12px; padding: 6px;
    transition: border-color 0.15s;
  }
  .composer-inner:focus-within { border-color: var(--cyan); }
  .composer-text {
    flex: 1; resize: none;
    background: transparent; border: 0; outline: 0;
    color: var(--text); font: inherit; font-size: 14px; line-height: 1.5;
    padding: 8px 6px; max-height: 200px;
  }
  .composer-text::placeholder { color: var(--text-3); }
  .composer .icon-btn { border: 0; background: transparent; }
  .send-btn {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--cyan); color: #05070A; border: 0;
    display: grid; place-items: center;
    transition: opacity 0.15s;
  }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; }

  .voice-on-pulse {
    position: relative;
  }
  .voice-on-pulse::after {
    content: ''; position: absolute; inset: -2px;
    border-radius: 8px; border: 2px solid var(--cyan);
    animation: pulse-ring 1.6s ease-out infinite;
  }
  @keyframes pulse-ring {
    0% { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(1.35); opacity: 0; }
  }

  .composer-hint {
    max-width: 820px; margin: 6px auto 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-3); letter-spacing: 0.06em;
    display: flex; justify-content: space-between;
  }

  /* ============ Loading ============ */
  .boot-screen {
    display: grid; place-items: center;
    height: 100%; color: var(--text-2);
    font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.08em;
  }
</style>
</head>
<body>
<div id="root">
  <div class="boot-screen">ИНИЦИАЛИЗАЦИЯ…</div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ============ Bootstrap data ============ */
let DEPARTMENTS = [];
let ORCHESTRATOR = { id: 'orchestrator', name: 'Оркестратор', agents: [] };

async function loadBootstrap() {
  try {
    const r = await fetch('/api/bootstrap', { headers: { Accept: 'application/json' } });
    if (!r.ok) throw new Error('http ' + r.status);
    const d = await r.json();
    DEPARTMENTS = Array.isArray(d.departments) ? d.departments : [];
    if (d.orchestrator) ORCHESTRATOR = d.orchestrator;
    return true;
  } catch (e) {
    console.error('[bootstrap] failed:', e);
    return false;
  }
}

async function loadHealth() {
  try {
    const r = await fetch('/api/health');
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

/* ============ localStorage sessions ============ */
const STORAGE_KEY = 'mas.sessions.v1';
function loadSessions() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch { return []; }
}
function saveSessions(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
}
function newSession(agentId) {
  return {
    id: 'sess_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6),
    agentId: agentId || null,
    title: 'Новый чат',
    messages: [],
    createdAt: Date.now(),
    updatedAt: Date.now(),
  };
}

/* ============ Lookups ============ */
function findAgent(agentId) {
  if (!agentId) return null;
  if (agentId === 'orchestrator' || agentId === 'chief') {
    const a = ORCHESTRATOR.agents.find((x) => x.id === 'chief') || ORCHESTRATOR.agents[0];
    return a ? { agent: a, dept: { name: 'Оркестратор', accent: '#4DE3FF' } } : null;
  }
  for (const dept of DEPARTMENTS) {
    const agent = dept.agents.find((x) => x.id === agentId);
    if (agent) return { agent, dept };
  }
  const orchA = ORCHESTRATOR.agents.find((x) => x.id === agentId);
  if (orchA) return { agent: orchA, dept: { name: 'Оркестратор', accent: '#4DE3FF' } };
  return null;
}

/* ============ Web Speech API ============ */
function createRecognizer() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const rec = new SR();
  rec.lang = 'ru-RU';
  rec.interimResults = true;
  rec.continuous = false;
  return rec;
}

function speak(text, lang = 'ru-RU') {
  try {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = 1.0;
    u.pitch = 1.0;
    window.speechSynthesis.speak(u);
  } catch {}
}

/* ============ Icons ============ */
const Icon = {
  Plus: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  Send: () => <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.5 21.5l19-9.5-19-9.5v7.4l13 2.1-13 2.1z"/></svg>,
  Mic: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="2" width="6" height="13" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="22"/></svg>,
  MicOff: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="2" y1="2" x2="22" y2="22"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M19 10v2a7 7 0 0 1-.11 1.23M5 10v2a7 7 0 0 0 12 5"/><line x1="12" y1="19" x2="12" y2="22"/></svg>,
  Sound: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>,
  SoundOff: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>,
  Trash: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
  Diamond: () => <svg viewBox="0 0 22 22"><polygon points="11,2 19,7 19,15 11,20 3,15 3,7" fill="none" stroke="#4DE3FF" strokeWidth="1.4"/><circle cx="11" cy="11" r="2" fill="#4DE3FF"/></svg>,
};

/* ============ TopBar ============ */
function TopBar({ health, activeAgent }) {
  const ok = health && health.ok;
  const llmOk = health && health.llm && health.llm.configured;
  return (
    <div className="topbar">
      <div className="tb-left">
        <div className="tb-mark"><Icon.Diamond/></div>
        <div>
          <div className="tb-title">Многоагентная Система</div>
          <div className="tb-sub">CHAT · CONTROL</div>
        </div>
      </div>
      <div className="tb-right">
        {activeAgent && (
          <div className="tb-pill" style={{borderColor: 'rgba(77,227,255,0.3)'}}>
            <span style={{color: 'var(--cyan)'}}>●</span>
            <span className="mono">{activeAgent.dept?.name || ''} / {activeAgent.agent?.name}</span>
          </div>
        )}
        <div className={`tb-pill ${llmOk ? '' : 'warn'}`}>
          <span className="dot"/>
          <span className="mono">
            {llmOk
              ? `LLM · ${(health.llm.defaults?.default || '').split('/').pop() || 'OPENROUTER'}`
              : 'NO KEY'}
          </span>
        </div>
        <div className={`tb-pill ${ok ? '' : 'err'}`}>
          <span className="dot"/>
          <span className="mono">{ok ? 'API ONLINE' : 'OFFLINE'}</span>
        </div>
        <a className="tb-link" href="/map.html">Карта →</a>
      </div>
    </div>
  );
}

/* ============ History sidebar ============ */
function HistorySidebar({ sessions, activeId, onSelect, onNew, onDelete }) {
  return (
    <div className="col col-history">
      <div className="col-head">
        <span>История</span>
        <span className="mono">{sessions.length}</span>
      </div>
      <div className="col-body">
        <button className="btn-new" onClick={onNew}><Icon.Plus/> Новый чат</button>
        {sessions.length === 0 && (
          <div style={{padding: '12px 8px', color: 'var(--text-3)', fontSize: 12}}>
            История пуста. Начни первый диалог.
          </div>
        )}
        {sessions.map((s) => {
          const info = findAgent(s.agentId);
          const accent = info?.dept?.accent || '#4DE3FF';
          return (
            <div
              key={s.id}
              className={`session-item ${s.id === activeId ? 'is-active' : ''}`}
              onClick={() => onSelect(s.id)}
              role="button"
            >
              <button
                className="si-del"
                onClick={(e) => { e.stopPropagation(); onDelete(s.id); }}
                title="Удалить"
              >×</button>
              <div className="si-title">{s.title || 'Новый чат'}</div>
              <div className="si-meta">
                <span className="si-dot" style={{background: accent}}/>
                <span>{info?.agent?.name || 'оркестратор'}</span>
                <span>·</span>
                <span>{s.messages.length} сообщ.</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ============ Agents sidebar ============ */
function AgentsSidebar({ activeAgentId, onPick }) {
  return (
    <div className="col col-agents">
      <div className="col-head"><span>Агенты</span></div>
      <div className="col-body">
        <div className="dept-block">
          <div className="dept-head">
            <span className="dept-accent" style={{background: '#4DE3FF'}}/>
            <span>Оркестрация</span>
          </div>
          {ORCHESTRATOR.agents.slice(0, 1).map((a) => (
            <button
              key={a.id}
              className={`agent-btn ${activeAgentId === a.id || (!activeAgentId && a.id === 'chief') ? 'is-active' : ''}`}
              onClick={() => onPick(a.id)}
            >
              <span className="ab-name">{a.name}</span>
            </button>
          ))}
        </div>
        {DEPARTMENTS.map((d) => (
          <div key={d.id} className="dept-block">
            <div className="dept-head">
              <span className="dept-accent" style={{background: d.accent}}/>
              <span>{d.name}</span>
            </div>
            {d.agents.map((a) => (
              <button
                key={a.id}
                className={`agent-btn ${activeAgentId === a.id ? 'is-active' : ''}`}
                onClick={() => onPick(a.id)}
                title={a.example}
              >
                <span className="ab-name">{a.name}</span>
                <span className="ab-skill">{(a.skills?.[0] || '').slice(0, 12)}</span>
              </button>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ============ Chat messages ============ */
function Message({ msg }) {
  const isUser = msg.role === 'user';
  const isStreaming = msg.streaming;
  const modelTag = msg.model ? ` · ${msg.model.split('/').pop()}` : '';
  return (
    <div className={`msg is-${isUser ? 'user' : 'bot'}`}>
      <div className="msg-meta">
        {isUser ? 'ВЫ' : (msg.agentName || 'АГЕНТ')} · {new Date(msg.ts).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })}{!isUser ? modelTag : ''}
      </div>
      {msg.route && (
        <div className="msg-route">→ {msg.route.deptName ? `${msg.route.deptName} / ` : ''}{msg.route.agentName}</div>
      )}
      {Array.isArray(msg.tools) && msg.tools.length > 0 && (
        <div className="msg-tools">
          {msg.tools.map((t) => {
            const icon = t.name === 'firecrawl_search' ? '🔍' : t.name === 'firecrawl_scrape' ? '📄' : '🛠';
            const arg = t.name === 'firecrawl_search'
              ? (t.args?.query || '')
              : t.name === 'firecrawl_scrape'
                ? (t.args?.url || '')
                : JSON.stringify(t.args || {});
            const statusLabel = t.status === 'running'
              ? 'running'
              : t.status === 'error'
                ? 'error'
                : t.name === 'firecrawl_search' && typeof t.summary?.count === 'number'
                  ? `${t.summary.count} hits`
                  : t.name === 'firecrawl_scrape' && typeof t.summary?.chars === 'number'
                    ? `${t.summary.chars} chars`
                    : 'done';
            return (
              <div key={t.id} className={`tool-chip is-${t.status}`} title={t.error || arg}>
                <span>{icon}</span>
                <span className="tool-name">{t.name}</span>
                <span className="tool-arg">{arg}</span>
                <span className="tool-status">{statusLabel}</span>
              </div>
            );
          })}
        </div>
      )}
      <div className="msg-bubble">
        {msg.content || (isStreaming ? <span className="typing"><span/><span/><span/></span> : '')}
      </div>
      {Array.isArray(msg.images) && msg.images.length > 0 && (
        <div style={{display: 'flex', flexWrap: 'wrap', gap: 8, marginTop: 6}}>
          {msg.images.map((src, i) => (
            <a key={i} href={src} target="_blank" rel="noreferrer">
              <img src={src} alt={`gen-${i}`} style={{maxWidth: 320, maxHeight: 320, borderRadius: 8, border: '1px solid var(--border-strong)'}}/>
            </a>
          ))}
        </div>
      )}
      {msg.okrHint && <div className="msg-okr">KR в фокусе: {msg.okrHint}</div>}
    </div>
  );
}

/* ============ Main App ============ */
function App() {
  const [bootstrapped, setBootstrapped] = useState(false);
  const [health, setHealth] = useState(null);
  const [sessions, setSessions] = useState(() => loadSessions());
  const [activeId, setActiveId] = useState(null);
  const [input, setInput] = useState('');
  const [activeAgentId, setActiveAgentId] = useState(null);
  const [voiceListening, setVoiceListening] = useState(false);
  const [voiceSpeak, setVoiceSpeak] = useState(false);
  const [isSending, setIsSending] = useState(false);
  const bodyRef = useRef(null);
  const recognizerRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    (async () => {
      await loadBootstrap();
      const h = await loadHealth();
      setHealth(h);
      setBootstrapped(true);
    })();
  }, []);

  useEffect(() => { saveSessions(sessions); }, [sessions]);

  const activeSession = useMemo(
    () => sessions.find((s) => s.id === activeId) || null,
    [sessions, activeId]
  );

  const currentAgentId = activeSession?.agentId || activeAgentId;
  const activeAgentInfo = useMemo(() => findAgent(currentAgentId), [currentAgentId, bootstrapped]);

  useEffect(() => {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [activeSession?.messages?.length, isSending]);

  function handleNewChat() {
    const s = newSession(activeAgentId);
    setSessions((prev) => [s, ...prev]);
    setActiveId(s.id);
    setInput('');
    setTimeout(() => inputRef.current?.focus(), 50);
  }

  function handlePickAgent(agentId) {
    setActiveAgentId(agentId);
    if (activeSession && activeSession.messages.length === 0) {
      setSessions((prev) => prev.map((s) => s.id === activeSession.id ? { ...s, agentId } : s));
    } else if (!activeSession) {
      const s = newSession(agentId);
      setSessions((prev) => [s, ...prev]);
      setActiveId(s.id);
    } else {
      const s = newSession(agentId);
      setSessions((prev) => [s, ...prev]);
      setActiveId(s.id);
    }
  }

  function handleDeleteSession(id) {
    setSessions((prev) => prev.filter((s) => s.id !== id));
    if (activeId === id) setActiveId(null);
  }

  function appendMessage(sessionId, msg) {
    setSessions((prev) => prev.map((s) => {
      if (s.id !== sessionId) return s;
      const messages = [...s.messages, msg];
      const updatedAt = Date.now();
      let title = s.title;
      if (s.messages.length === 0 && msg.role === 'user') {
        title = msg.content.slice(0, 60) + (msg.content.length > 60 ? '…' : '');
      }
      return { ...s, messages, updatedAt, title };
    }));
  }

  function updateLastBotMessage(sessionId, patch) {
    setSessions((prev) => prev.map((s) => {
      if (s.id !== sessionId) return s;
      const messages = s.messages.slice();
      for (let i = messages.length - 1; i >= 0; i--) {
        if (messages[i].role === 'assistant') {
          const next = typeof patch === 'function' ? patch(messages[i]) : { ...messages[i], ...patch };
          messages[i] = next;
          break;
        }
      }
      return { ...s, messages };
    }));
  }

  async function handleSend(textArg) {
    const text = (textArg ?? input).trim();
    if (!text || isSending) return;

    let session = activeSession;
    if (!session) {
      session = newSession(activeAgentId);
      setSessions((prev) => [session, ...prev]);
      setActiveId(session.id);
    }
    const sessionId = session.id;

    const userMsg = { role: 'user', content: text, ts: Date.now() };
    appendMessage(sessionId, userMsg);
    setInput('');

    // /img <prompt> — генерация изображения через nano-banana
    if (/^\/img(\s|$)/i.test(text)) {
      const prompt = text.replace(/^\/img\s*/i, '').trim() || 'multi-agent system, abstract isometric infographic, dark UI, cyan accent';
      const botMsg = {
        role: 'assistant', content: 'Генерирую изображение…', ts: Date.now(),
        streaming: true, agentName: 'NANO-BANANA', images: [], model: 'google/gemini-2.5-flash-image-preview',
      };
      appendMessage(sessionId, botMsg);
      setIsSending(true);
      try {
        const r = await fetch('/api/image', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt }),
        });
        const data = await r.json();
        if (!r.ok) {
          updateLastBotMessage(sessionId, { content: `Ошибка генерации: ${data.error || r.status}. ${data.body || ''}`.slice(0, 500), streaming: false });
        } else {
          updateLastBotMessage(sessionId, {
            content: data.raw_text || (data.images?.length ? '' : 'Модель не вернула изображение.'),
            images: data.images || [],
            model: data.model,
            streaming: false,
          });
        }
      } catch (e) {
        updateLastBotMessage(sessionId, { content: 'Не удалось сгенерировать изображение: ' + (e?.message || e), streaming: false });
      } finally {
        setIsSending(false);
      }
      return;
    }

    const botMsg = {
      role: 'assistant', content: '', ts: Date.now(),
      streaming: true, agentName: null, route: null, okrHint: null, model: null,
      tools: [],
    };
    appendMessage(sessionId, botMsg);

    setIsSending(true);
    try {
      const history = [...session.messages, userMsg].map((m) => ({ role: m.role, content: m.content }));
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: history,
          agentId: session.agentId || activeAgentId || null,
        }),
      });
      if (!res.ok || !res.body) {
        const errText = await res.text().catch(() => '');
        updateLastBotMessage(sessionId, { content: `Ошибка сервера: ${res.status}. ${errText.slice(0, 200)}`, streaming: false });
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder('utf-8');
      let buffer = '';
      let acc = '';
      let metaApplied = false;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const blocks = buffer.split('\n\n');
        buffer = blocks.pop() || '';
        for (const block of blocks) {
          const lines = block.split('\n');
          let event = 'message';
          let data = '';
          for (const line of lines) {
            if (line.startsWith('event:')) event = line.slice(6).trim();
            else if (line.startsWith('data:')) data += line.slice(5).trim();
          }
          if (!data) continue;
          let json;
          try { json = JSON.parse(data); } catch { continue; }
          if (event === 'meta') {
            const route = json.dept ? { deptName: json.dept.name, agentName: json.agent?.name } : { agentName: json.agent?.name };
            updateLastBotMessage(sessionId, {
              agentName: json.agent?.name?.toUpperCase() || 'АГЕНТ',
              route,
              okrHint: json.okrHint || null,
              model: json.model || null,
            });
            if (!session.agentId && json.agent?.id) {
              setSessions((prev) => prev.map((s) => s.id === sessionId ? { ...s, agentId: json.agent.id } : s));
            }
            metaApplied = true;
          } else if (event === 'delta') {
            acc += json.content || '';
            updateLastBotMessage(sessionId, { content: acc });
          } else if (event === 'tool_call') {
            updateLastBotMessage(sessionId, (prev) => {
              const tools = Array.isArray(prev.tools) ? prev.tools.slice() : [];
              tools.push({ id: json.id, name: json.name, args: json.args || {}, status: 'running' });
              return { ...prev, tools };
            });
          } else if (event === 'tool_result') {
            updateLastBotMessage(sessionId, (prev) => {
              const tools = (prev.tools || []).map((t) =>
                t.id === json.id ? { ...t, status: 'done', summary: json.summary || {} } : t
              );
              return { ...prev, tools };
            });
          } else if (event === 'tool_error') {
            updateLastBotMessage(sessionId, (prev) => {
              const tools = (prev.tools || []).map((t) =>
                t.id === json.id ? { ...t, status: 'error', error: json.message || 'error' } : t
              );
              return { ...prev, tools };
            });
          } else if (event === 'error') {
            updateLastBotMessage(sessionId, { content: `Ошибка LLM: ${json.message || json.body || json.status}`, streaming: false });
            return;
          } else if (event === 'done') {
            updateLastBotMessage(sessionId, { streaming: false });
            if (voiceSpeak && acc) speak(acc);
            return;
          }
        }
      }
      updateLastBotMessage(sessionId, { streaming: false });
      if (voiceSpeak && acc) speak(acc);
    } catch (e) {
      updateLastBotMessage(sessionId, { content: 'Не удалось получить ответ: ' + (e?.message || e), streaming: false });
    } finally {
      setIsSending(false);
    }
  }

  function toggleVoice() {
    if (voiceListening) {
      recognizerRef.current?.stop();
      return;
    }
    let rec = recognizerRef.current;
    if (!rec) {
      rec = createRecognizer();
      if (!rec) { alert('Распознавание речи не поддерживается в этом браузере. Используйте Chrome или Edge.'); return; }
      rec.onresult = (e) => {
        let interim = '';
        let final = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const t = e.results[i][0].transcript;
          if (e.results[i].isFinal) final += t; else interim += t;
        }
        if (final) {
          setInput((cur) => (cur ? cur + ' ' : '') + final.trim());
        } else if (interim) {
          setInput(interim);
        }
      };
      rec.onend = () => setVoiceListening(false);
      rec.onerror = () => setVoiceListening(false);
      recognizerRef.current = rec;
    }
    try { rec.start(); setVoiceListening(true); } catch { setVoiceListening(false); }
  }

  function toggleSpeak() {
    setVoiceSpeak((v) => {
      const next = !v;
      if (!next) window.speechSynthesis?.cancel();
      return next;
    });
  }

  if (!bootstrapped) return <div className="boot-screen">ИНИЦИАЛИЗАЦИЯ…</div>;

  const messages = activeSession?.messages || [];
  const headInfo = activeAgentInfo || { agent: { name: 'Главный оркестратор' }, dept: { name: 'Оркестрация', accent: '#4DE3FF' } };

  return (
    <div className="app">
      <TopBar health={health} activeAgent={headInfo} />
      <div className="workspace">
        <HistorySidebar
          sessions={sessions}
          activeId={activeId}
          onSelect={setActiveId}
          onNew={handleNewChat}
          onDelete={handleDeleteSession}
        />
        <div className="col col-chat">
          <div className="chat">
            <div className="chat-head">
              <div className="chat-head-mark" style={{borderColor: headInfo.dept?.accent || 'var(--cyan)'}}>
                <Icon.Diamond/>
              </div>
              <div>
                <div className="chat-head-title">{headInfo.agent?.name}</div>
                <div className="chat-head-sub">{headInfo.dept?.name || 'Оркестрация'}</div>
              </div>
              <div className="chat-head-actions">
                <button className={`icon-btn ${voiceSpeak ? 'is-on' : ''}`}
                        onClick={toggleSpeak} title={voiceSpeak ? 'Озвучка включена' : 'Озвучить ответы'}>
                  {voiceSpeak ? <Icon.Sound/> : <Icon.SoundOff/>}
                </button>
                {activeSession && (
                  <button className="icon-btn" onClick={() => handleDeleteSession(activeSession.id)} title="Удалить чат">
                    <Icon.Trash/>
                  </button>
                )}
              </div>
            </div>
            <div className="chat-body" ref={bodyRef}>
              {messages.length === 0 && (
                <div className="empty-state">
                  <h2>Чем займёмся?</h2>
                  <p>Опиши задачу — оркестратор сам определит, какому агенту её передать. Или выбери агента справа.</p>
                  <div className="empty-suggest">
                    {[
                      'Сделай лендинг под КП',
                      'Напиши пост в Telegram про запуск',
                      'Запусти таргет на B2B-аудиторию',
                      'Найди бенчмарки по NRR',
                      'Разбери архитектуру нового SaaS',
                      '/img изометрическая инфографика многоагентной системы',
                    ].map((s) => (
                      <button key={s} onClick={() => handleSend(s)}>{s}</button>
                    ))}
                  </div>
                </div>
              )}
              {messages.map((m, i) => <Message key={i} msg={m} />)}
            </div>
            <div className="composer">
              <div className="composer-inner">
                <button
                  className={`icon-btn ${voiceListening ? 'voice-on-pulse' : ''}`}
                  onClick={toggleVoice}
                  title={voiceListening ? 'Остановить запись' : 'Голосовой ввод'}
                  style={voiceListening ? { color: 'var(--cyan)' } : {}}
                >
                  {voiceListening ? <Icon.Mic/> : <Icon.Mic/>}
                </button>
                <textarea
                  ref={inputRef}
                  className="composer-text"
                  value={input}
                  onChange={(e) => setInput(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
                  }}
                  placeholder={voiceListening ? 'Слушаю…' : 'Опишите задачу или нажмите микрофон'}
                  rows={1}
                />
                <button
                  className="send-btn"
                  onClick={() => handleSend()}
                  disabled={!input.trim() || isSending}
                  title="Отправить"
                >
                  <Icon.Send/>
                </button>
              </div>
              <div className="composer-hint">
                <span>Enter — отправить · Shift+Enter — перенос · <span className="mono">/img &lt;prompt&gt;</span> — картинка</span>
                <span>{isSending ? 'ответ генерируется…' : (voiceListening ? 'идёт распознавание…' : '')}</span>
              </div>
            </div>
          </div>
        </div>
        <AgentsSidebar activeAgentId={currentAgentId} onPick={handlePickAgent} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
