name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 72.56.109.22
          username: root
          port: 22
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/multi-agent-system
            git fetch --all --prune
            git reset --hard origin/main
            npm ci --omit=dev
            if pm2 describe multi-agent > /dev/null 2>&1; then
              pm2 reload multi-agent --update-env
            else
              pm2 start npm --name multi-agent -- start
            fi
            pm2 save
            sleep 3
            curl -fsS http://127.0.0.1:3000/api/health > /tmp/deploy-health.json
            cat /tmp/deploy-health.json
